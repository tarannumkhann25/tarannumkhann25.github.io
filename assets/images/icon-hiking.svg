<path d="M32 8 L35 15 L38 12 L40 18" fill="none" stroke="#FFBC5E" stroke-width="0.8" opacity="0.7"/>

<!-- Snow caps -->
<path d="M11 18 L12 16 L13 18" fill="#FFDB6E" opacity="0.9"/>
<path d="M31 8 L32 6 L33 8" fill="#FFDB6E" opacity="0.9"/>

<!-- Ground/base -->
